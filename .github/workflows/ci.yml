name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.5.7
      - name: ruff check
        run: ruff check python/mind_nerve
      - name: ruff format check
        run: ruff format --check python/mind_nerve

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - name: Verify protected lib in wheel
        run: |
          python -c "
          import zipfile, sys
          with zipfile.ZipFile([f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0].replace('/', '')) as z:
              names = z.namelist()
          assert any('lib/libmindnerve.so' in n for n in names), f'protected .so missing from wheel: {names}'
          print('OK: libmindnerve.so present in wheel')
          " || (cd dist && python -c "
          import zipfile, glob
          whl = glob.glob('*.whl')[0]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          assert any('lib/libmindnerve.so' in n for n in names), f'protected .so missing from wheel: {names}'
          print('OK: libmindnerve.so present in wheel')
          ")
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    name: Smoke test (Python ${{ matrix.python }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install wheel
        run: pip install dist/*.whl
      - name: Import smoke
        run: |
          python -c "
          import mind_nerve, pathlib
          assert mind_nerve.__version__
          p = pathlib.Path(mind_nerve.__file__).parent / 'lib' / 'libmindnerve.so'
          assert p.exists(), f'libmindnerve.so missing: {p}'
          print(f'mind_nerve {mind_nerve.__version__} OK; lib at {p}')
          "
      - name: CLI surface smoke
        run: |
          mind-nerve --version
          mind-nerve --help
          mind-nerve-install list

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest tests/python -v
