name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.5.7
      - name: ruff check
        run: ruff check python/mind_nerve
      - name: ruff format check
        run: ruff format --check python/mind_nerve

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - name: Note about protected .so
        run: |
          # The FORTRESS-protected libmindnerve.so is NOT in the public repo —
          # it's bundled into the wheel only at STARGA release time. CI here
          # validates the OSS surface (Python code, tests, lint, build); the
          # production wheel published to PyPI is built locally and re-uploaded.
          echo "CI builds an OSS-surface wheel (no .so). Release wheels are built locally with the protected runtime bundled."
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    name: Smoke test (Python ${{ matrix.python }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install wheel
        run: pip install dist/*.whl
      - name: Import smoke
        run: |
          # CI's wheel does NOT bundle libmindnerve.so (proprietary, not in repo).
          # We verify the Python surface imports cleanly. The .so is bundled
          # into production wheels at STARGA release time before PyPI upload.
          python -c "
          import mind_nerve
          assert mind_nerve.__version__
          print(f'mind_nerve {mind_nerve.__version__} import OK (CI builds without protected .so by design)')
          "
      - name: CLI surface smoke
        run: |
          mind-nerve --version
          mind-nerve --help
          mind-nerve-install list

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest tests/python -v

  mindc-parse:
    name: mindc-parse (Phase 2 Q16.16 kernels)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Checkout mind compiler at v0.4.4
        uses: actions/checkout@v4
        with:
          repository: star-ga/mind
          ref: v0.4.4
          path: mind-compiler
      - name: Build mindc
        working-directory: mind-compiler
        run: cargo build --release --features "std-surface cross-module-imports" --bin mindc
      - name: Parse every .mind file in mind/luts/, mind/kernels/, and mind/exports/
        run: |
          MINDC=$(pwd)/mind-compiler/target/release/mindc
          fail=0
          for f in mind/luts/*.mind mind/kernels/*.mind mind/exports/*.mind; do
            [ -f "$f" ] || continue
            echo "::group::Parsing $f"
            if "$MINDC" "$f" --emit-ir > /dev/null 2>&1; then
              echo "  OK"
            else
              echo "  FAIL — re-running with output:"
              "$MINDC" "$f" --emit-ir || true
              fail=1
            fi
            echo "::endgroup::"
          done
          if [ $fail -ne 0 ]; then
            echo "::error::One or more .mind files failed to parse under mindc v0.4.4"
            exit 1
          fi
          echo "All .mind kernels + LUTs parse cleanly under mindc v0.4.4."

  bit-identity-cpu:
    name: Bit-identity harness (CPU / PyTorch baseline)
    needs: [tests, mindc-parse]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"

      # -----------------------------------------------------------------------
      # Step 1: Verify committed corpus.json is well-formed and deterministic.
      # -----------------------------------------------------------------------
      - name: Verify corpus.json is committed and valid
        run: |
          python3 -c "
          import json, sys
          from pathlib import Path
          p = Path('tests/bit_identity/corpus.json')
          if not p.exists():
              print('::error::tests/bit_identity/corpus.json is missing from repo')
              sys.exit(1)
          data = json.loads(p.read_text())
          if len(data) != 1000:
              print(f'::error::corpus.json has {len(data)} entries, expected 1000')
              sys.exit(1)
          cats = {}
          for e in data:
              cats[e['category']] = cats.get(e['category'], 0) + 1
          expected = {'eval': 600, 'long': 200, 'adversarial': 200}
          for cat, n in expected.items():
              if cats.get(cat) != n:
                  print(f'::error::corpus.json: {cat}={cats.get(cat)}, expected {n}')
                  sys.exit(1)
          print(f'corpus.json: 1000 entries ({cats}) — OK')
          "

      # -----------------------------------------------------------------------
      # Step 2: Run corpus assembler and verify it matches committed corpus.json
      # (determinism gate — ensures corpus.py is idempotent).
      # -----------------------------------------------------------------------
      - name: Verify corpus assembler is deterministic
        run: |
          python3 tests/bit_identity/corpus.py /tmp/corpus_fresh.json
          python3 -c "
          import json
          committed = json.loads(open('tests/bit_identity/corpus.json').read())
          fresh     = json.loads(open('/tmp/corpus_fresh.json').read())
          if len(committed) != len(fresh):
              raise AssertionError(f'length mismatch: {len(committed)} vs {len(fresh)}')
          for i, (a, b) in enumerate(zip(committed, fresh)):
              if a != b:
                  raise AssertionError(f'entry {i} differs: {a[\"id\"]} != {b[\"id\"]}')
          print('Corpus is deterministic — committed and freshly-built match.')
          "

      # -----------------------------------------------------------------------
      # Step 3: Run pytest harness (all tests except the full 1000-query run).
      # BIT_IDENTITY_SKIP_SLOW=1 skips the full pytorch baseline run to keep
      # CI fast; the PyTorch baseline run is covered by the next step.
      # -----------------------------------------------------------------------
      - name: Run bit-identity pytest (fast tests)
        env:
          BIT_IDENTITY_SKIP_SLOW: "1"
        run: |
          pytest tests/bit_identity -v --tb=short -k "not (test_full_corpus or test_pytorch_vs_pytorch)"

      # -----------------------------------------------------------------------
      # Step 4: Run PyTorch baseline on 50 queries (quick sanity — full 1000
      # is too slow for CI at ~2 min; full run is a pre-release local gate).
      # This confirms the runner produces well-formed output on real queries.
      # -----------------------------------------------------------------------
      - name: Run PyTorch backend (50-query CI subset)
        env:
          BIT_IDENTITY_SKIP_SLOW: "1"
        run: |
          python3 tests/bit_identity/runner.py \
            --backend pytorch \
            --limit 50 \
            --out /tmp/hashes_pytorch_ci.json
          python3 -c "
          import json, sys
          blob = json.loads(open('/tmp/hashes_pytorch_ci.json').read())
          records = blob['records']
          if len(records) != 50:
              print(f'::error::Expected 50 records, got {len(records)}')
              sys.exit(1)
          total = blob['total_hashes']
          if total != 50 * 7:
              print(f'::error::Expected 350 hashes, got {total}')
              sys.exit(1)
          keys = ('token_ids','post_embed_ln','final_layer_ln',
                  'post_cls_slice','post_l2_norm','catalog_scores',
                  'topk_indices_scores')
          for r in records:
              for k in keys:
                  h = r['hashes'].get(k, '')
                  ok = (len(h) == 64 and all(c in '0123456789abcdef' for c in h))
                  if not ok:
                      print(f'::error::Invalid hash for {r[\"id\"]}.{k}: {h!r}')
                      sys.exit(1)
          print(f'PyTorch CI subset: 50 queries x 7 hashes = 350 valid SHA-256 hashes.')
          "

      # -----------------------------------------------------------------------
      # Step 5: Run native backend (emits sentinels when .so not present — that
      # is the expected state in open-source CI where the .so is not committed).
      # Asserts the harness runs and produces a well-formed JSON blob.
      # -----------------------------------------------------------------------
      - name: Run native backend (sentinel mode — .so absent in open-source CI)
        run: |
          python3 tests/bit_identity/runner.py \
            --backend native \
            --limit 10 \
            --out /tmp/hashes_native_ci.json
          python3 -c "
          import json, sys
          blob = json.loads(open('/tmp/hashes_native_ci.json').read())
          records = blob['records']
          if len(records) != 10:
              print(f'::error::Expected 10 records, got {len(records)}')
              sys.exit(1)
          sentinel = 'BACKEND_STUB_NOT_BUILT'
          for r in records:
              for k, v in r['hashes'].items():
                  if v not in (sentinel, 'CUDA_DEFERRED_TO_V0_4_1') and not (
                      len(v) == 64 and all(c in '0123456789abcdef' for c in v)
                  ):
                      print(f'::error::Unexpected native hash {v!r}')
                      sys.exit(1)
          print('Native sentinel mode: 10 queries produced well-formed sentinel hashes.')
          "

      # -----------------------------------------------------------------------
      # Step 6: Run comparison (pytorch 50 vs native sentinel — zero failures
      # expected since sentinels are skipped in the comparator).
      # -----------------------------------------------------------------------
      - name: Compare PyTorch vs native (sentinel skip gate)
        run: |
          python3 tests/bit_identity/compare.py \
            /tmp/hashes_pytorch_ci.json \
            /tmp/hashes_native_ci.json \
            --top-k 5 --topk-threshold 0.0 --top1-threshold 0.0
          echo "Comparator completed — sentinel skip gate passed."

      # -----------------------------------------------------------------------
      # Step 7: Run CUDA backend (emits CUDA_DEFERRED_TO_V0_4_1 per §3.2).
      # -----------------------------------------------------------------------
      - name: Run CUDA backend (deferred sentinel per §3.2)
        run: |
          python3 tests/bit_identity/runner.py \
            --backend cuda \
            --limit 5 \
            --out /tmp/hashes_cuda_ci.json
          python3 -c "
          import json, sys
          blob = json.loads(open('/tmp/hashes_cuda_ci.json').read())
          sentinel = 'CUDA_DEFERRED_TO_V0_4_1'
          for r in blob['records']:
              for k, v in r['hashes'].items():
                  assert v == sentinel, f'Expected {sentinel!r}, got {v!r}'
          print('CUDA sentinel: all hashes are CUDA_DEFERRED_TO_V0_4_1 — OK.')
          "

      # -----------------------------------------------------------------------
      # Step 8: Sliding-window invariant (§3.3) — fast, no model needed.
      # -----------------------------------------------------------------------
      - name: Sliding-window invariant test (§3.3)
        run: |
          python3 tests/bit_identity/sliding_window_invariant.py \
            --corpus tests/bit_identity/corpus.json

      # -----------------------------------------------------------------------
      # Annotation: native .so absent is expected in open-source CI.
      # Full green-vs-green comparison requires the A1.3 wheel with the .so.
      # -----------------------------------------------------------------------
      - name: Annotate CI status
        if: always()
        run: |
          echo "::notice::bit-identity-cpu: PyTorch baseline (50 queries) validated."
          echo "::notice::bit-identity-cpu: Native backend absent (open-source CI) — sentinels emitted."
          echo "::notice::bit-identity-cpu: CUDA gate deferred to v0.4.1 per spec §3.2."
          echo "::notice::bit-identity-cpu: Full 1000-query baseline run is a pre-release local gate."
