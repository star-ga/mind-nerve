# mind-nerve autoresearch — research-driven architecture evolution loop.
#
# This is NOT a score-grinding loop. The goal is to keep mind-nerve at the
# state-of-the-art frontier by surfacing relevant recent research and
# proposing architecture changes derived from it. Three tools chain
# together as the validation pipeline:
#
#   autoresearch  — discovery + proposal driver (this config)
#   arch-mind     — structural invariant gate (no score regression)
#   skill-improver — code-quality gate when proposals include edits
#
# Each iteration:
#   1. Search recent arxiv / HF / blogs for papers relevant to mind-nerve's
#      open architecture questions (see autoresearch_program.md for the
#      target list).
#   2. Read the top-ranked paper's abstract + method. Filter for fit
#      with our non-negotiables (pure MIND, Q16.16+INT8, bit-identity,
#      30ms p95 cap, single binary).
#   3. Draft an RFC at research/RFC-NNN-<slug>.md describing the proposed
#      adoption: name, technique, why it fits, where it lands in the
#      module graph, accuracy/latency expectations, bit-identity story.
#   4. If the RFC includes code changes, apply them to the target_files
#      listed below.
#   5. Validate gates: arch-mind score must not regress on any metric;
#      skill-improver must not score any touched skill below its
#      current baseline.
#   6. If validations pass, commit the RFC (and any code) on a dedicated
#      autoresearch branch. Otherwise, append the rejection rationale
#      to the RFC and continue.
#
# Run with:
#     cd /home/n/mind-nerve
#     python3 /home/n/autoresearch/autorun.py --config autoresearch.yaml

cli: claude

cli_options:
  claude:
    model: ""
    allowed_tools: "Read,Write,Edit,Bash,Grep,Glob,WebSearch,WebFetch"
    permission_mode: "bypassPermissions"

# Files the agent may modify. The RFC file in research/ is always
# writeable; the source tree is in scope when the RFC includes a code
# change. Everything outside this list is read-only.
target_files:
  - RFCs/INDEX.md                       # rolling RFC accumulator (tracked)
  - src/q16_16.mind
  - src/sha256.mind
  - src/top_k.mind
  - src/evidence.mind
  - src/clock.mind
  - src/chain_log.mind
  - src/tokenizer.mind
  - src/loader.mind
  - src/model.mind
  - src/inference.mind
  - src/encoder_kernels.mind
  - src/runtime_ffi.mind
  - ROADMAP.md                          # Phase 2+ enhancements section

# Read-only context. autoresearch_program.md is the research direction;
# the spec files pin the constraints any proposal must respect.
readonly_files:
  - autoresearch_program.md
  - spec/architecture.md
  - spec/numerics.md
  - spec/quality_targets.md
  - spec/integration_surface.md
  - Mind.toml
  - README.md

# Validation pipeline. Composite metric — see metric.extract_regex.
# Each gate writes its score; we extract a composite into run.log.
run_command: "./.autoresearch-metric.sh"

metric:
  name: autoresearch_composite
  grep_pattern: "autoresearch_composite:"
  direction: maximize
  extract_regex: "autoresearch_composite:\\s*([0-9]+\\.[0-9]+)"

# Generous time budget per iteration — research discovery includes
# WebSearch calls that take time, and RFC drafting needs slow careful
# work. 30 minutes per iteration is the floor.
time_budget: 1800
timeout: 2400

branch_prefix: autoresearch
results_file: autoresearch_results.tsv

# Three consecutive failed iterations -> stop. Failures here are
# usually that the proposed change broke an arch-mind metric, which
# means the RFC needs human review before another agent retries.
max_consecutive_failures: 3

# Run forever, picking up where the prior session stopped. The
# results_file accumulates one row per iteration across sessions.
never_stop: true
