name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.5.7
      - name: ruff check
        run: ruff check python/mind_nerve
      - name: ruff format check
        run: ruff format --check python/mind_nerve

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - name: Note about native runtime
        run: |
          # The native runtime libmindnerve.so is not part of the public
          # source tree. CI here validates the OSS surface (Python code,
          # tests, lint, build); release wheels published to PyPI are
          # built separately.
          echo "CI builds an OSS-surface wheel. Release wheels are built separately."
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    name: Smoke test (Python ${{ matrix.python }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install wheel
        run: pip install dist/*.whl
      - name: Import smoke
        run: |
          # CI's wheel does NOT bundle libmindnerve.so (proprietary, not in repo).
          # We verify the Python surface imports cleanly. The .so is bundled
          # into production wheels at STARGA release time before PyPI upload.
          python -c "
          import mind_nerve
          assert mind_nerve.__version__
          print(f'mind_nerve {mind_nerve.__version__} import OK (CI builds without protected .so by design)')
          "
      - name: CLI surface smoke
        run: |
          mind-nerve --version
          mind-nerve --help
          mind-nerve-install list

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest tests/python -v

  qa-gates:
    name: QA gates (coverage + mypy + bandit + integration)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev + mcp extras
        run: pip install -e ".[dev,mcp]"

      # --------------------------------------------------------------
      # Bandit — static security lint over python/mind_nerve.
      # Two known medium findings are tolerated today: (1) HF
      # AutoTokenizer.from_pretrained called on a LOCAL checkpoint
      # path (B615 false-positive — the runtime is already revision-
      # pinned via _seed_from_hf); (2) /tmp fallback for socket dir
      # when XDG_RUNTIME_DIR is absent. Both are tracked for cleanup
      # but should not block PRs.
      # --------------------------------------------------------------
      - name: Run bandit (high-severity gate)
        run: |
          bandit -r python/mind_nerve -x tests \
              --severity-level high \
              --confidence-level medium
      - name: Run bandit (medium+; report-only)
        run: |
          bandit -r python/mind_nerve -x tests \
              --severity-level medium \
              --confidence-level medium || \
              echo "::notice::qa-gates: bandit medium findings tolerated; tracked in audit log"

      # --------------------------------------------------------------
      # mypy — strict on the three public modules pinned in pyproject
      # [[tool.mypy.overrides]]. Other modules are checked but
      # non-strictly; the path-by-path expansion plan is in
      # pyproject.toml's [tool.mypy] block.
      # --------------------------------------------------------------
      - name: Run mypy (strict on public surface)
        run: |
          mypy python/mind_nerve/inference.py \
               python/mind_nerve/installer.py \
               python/mind_nerve/_runtime_dir.py \
               --strict --ignore-missing-imports || true
          # Non-strict full-package pass to surface obvious type bugs.
          mypy python/mind_nerve --ignore-missing-imports || true
          echo "::notice::qa-gates: mypy run completed (non-blocking during Phase 1 expansion)"

      # --------------------------------------------------------------
      # Coverage gate — pytest over tests/python + tests/integration.
      # tests/perf/ is intentionally excluded (separate matrix step).
      #
      # CI floor: 30%. Two structural reasons the CI-executable subset
      # is below the local figure (~42% with the runtime present):
      #   1. CLI/daemon/MCP/preselect_hook surfaces are subprocess-shaped
      #      and invisible to in-process coverage.
      #   2. The native encoder .so, the `datasets` extra, and network
      #      are absent in a fresh CI checkout, so the byte-identity /
      #      LUT / trainer-determinism / encode-path tests skip (by
      #      design — they self-skip rather than error). Their covered
      #      lines therefore don't count in CI.
      # 30% gates real regressions (a drop below it means something in
      # the always-runnable pure-Python surface broke) without
      # penalising the correct skip-on-missing-artifact behaviour.
      # The path-by-path expansion plan (measured against a runtime-
      # present environment) is unchanged:
      #
      #   v0.3.0  : 30% CI floor / ~42% local — inference/installer
      #             atomicity + safe_write.
      #   v0.4.0  : 55% local floor — adds cli.py + discovery.py + MCP
      #             coverage via process-level integration tests.
      #   v0.5.0  : 70% — match the audit P0 acceptance threshold.
      #   v1.0    : 85% — match the audit "10/10" acceptance gate.
      #
      # Ratchet in lockstep with the next release tag, never in isolation.
      # --------------------------------------------------------------
      - name: Run pytest with coverage
        run: |
          pytest tests/python tests/integration -v \
              --cov=python/mind_nerve \
              --cov-report=term-missing \
              --cov-report=xml \
              --cov-fail-under=30 \
              --ignore=tests/integration/test_daemon_socket.py
        env:
          MIND_NERVE_BACKEND: pytorch

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  perf-budget:
    name: Perf budget gate (route p95 report)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"

      # Perf gate is a *report* by default — fails only if p95 exceeds
      # the regression-detector ceiling (200 ms). The Phase-1 spec
      # target (30 ms) is reported alongside the current README floor
      # (~90 ms) so any regression vs the prior tag is visible.
      # MIND_NERVE_PERF_SKIP=1 makes the test self-skip when the
      # auto-seeded runtime is not available (e.g. CI without HF
      # network access).
      - name: Run perf budget test (report-only, with skip-fallback)
        env:
          MIND_NERVE_PERF_SKIP: "1"
        run: pytest tests/perf -v --tb=short -m perf || true

  mindc-parse:
    name: mindc-parse (Phase 2 Q16.16 kernels)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Checkout mind compiler at v0.4.4
        uses: actions/checkout@v4
        with:
          repository: star-ga/mind
          ref: v0.4.4
          path: mind-compiler
      - name: Build mindc
        working-directory: mind-compiler
        run: cargo build --release --features "std-surface cross-module-imports" --bin mindc
      - name: Parse every .mind file in mind/luts/, mind/kernels/, and mind/exports/
        run: |
          MINDC=$(pwd)/mind-compiler/target/release/mindc
          fail=0
          for f in mind/luts/*.mind mind/kernels/*.mind mind/exports/*.mind; do
            [ -f "$f" ] || continue
            echo "::group::Parsing $f"
            if "$MINDC" "$f" --emit-ir > /dev/null 2>&1; then
              echo "  OK"
            else
              echo "  FAIL — re-running with output:"
              "$MINDC" "$f" --emit-ir || true
              fail=1
            fi
            echo "::endgroup::"
          done
          if [ $fail -ne 0 ]; then
            echo "::error::One or more .mind files failed to parse under the in-tree mindc"
            exit 1
          fi
          echo "All .mind kernels + LUTs parse cleanly under the in-tree mindc."

  bit-identity-cpu:
    name: Bit-identity harness (CPU / PyTorch baseline)
    needs: [tests, mindc-parse]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"

      # -----------------------------------------------------------------------
      # Step 1: Verify committed corpus.json is well-formed and deterministic.
      # -----------------------------------------------------------------------
      - name: Verify corpus.json is committed and valid
        run: |
          python3 -c "
          import json, sys
          from pathlib import Path
          p = Path('tests/bit_identity/corpus.json')
          if not p.exists():
              print('::error::tests/bit_identity/corpus.json is missing from repo')
              sys.exit(1)
          data = json.loads(p.read_text())
          if len(data) != 1000:
              print(f'::error::corpus.json has {len(data)} entries, expected 1000')
              sys.exit(1)
          cats = {}
          for e in data:
              cats[e['category']] = cats.get(e['category'], 0) + 1
          expected = {'eval': 600, 'long': 200, 'adversarial': 200}
          for cat, n in expected.items():
              if cats.get(cat) != n:
                  print(f'::error::corpus.json: {cat}={cats.get(cat)}, expected {n}')
                  sys.exit(1)
          print(f'corpus.json: 1000 entries ({cats}) — OK')
          "

      # -----------------------------------------------------------------------
      # Step 2: Run corpus assembler and verify it matches committed corpus.json
      # (determinism gate — ensures corpus.py is idempotent).
      # -----------------------------------------------------------------------
      - name: Verify corpus assembler is deterministic
        run: |
          python3 tests/bit_identity/corpus.py /tmp/corpus_fresh.json
          python3 -c "
          import json
          committed = json.loads(open('tests/bit_identity/corpus.json').read())
          fresh     = json.loads(open('/tmp/corpus_fresh.json').read())
          if len(committed) != len(fresh):
              raise AssertionError(f'length mismatch: {len(committed)} vs {len(fresh)}')
          for i, (a, b) in enumerate(zip(committed, fresh)):
              if a != b:
                  raise AssertionError(f'entry {i} differs: {a[\"id\"]} != {b[\"id\"]}')
          print('Corpus is deterministic — committed and freshly-built match.')
          "

      # -----------------------------------------------------------------------
      # Step 3: Run pytest harness (all tests except the full 1000-query run).
      # BIT_IDENTITY_SKIP_SLOW=1 skips the full pytorch baseline run to keep
      # CI fast; the PyTorch baseline run is covered by the next step.
      # -----------------------------------------------------------------------
      - name: Run bit-identity pytest (fast tests)
        env:
          BIT_IDENTITY_SKIP_SLOW: "1"
        run: |
          pytest tests/bit_identity -v --tb=short -k "not (test_full_corpus or test_pytorch_vs_pytorch)"

      # -----------------------------------------------------------------------
      # Step 4: PyTorch baseline is a pre-release LOCAL gate.
      #
      # The live BGE-small-en-v1.5 checkpoint (~80 MB at
      # ~/.local/share/mind-nerve/runtime/checkpoint) is installed on
      # release-engineering boxes by `mind-nerve-install`, not in the
      # public CI runner. Running the PyTorch backend against the live
      # encoder is therefore a local pre-release gate, consistent with
      # the rest of mind-nerve's CI philosophy: OSS CI validates the
      # surface (Python imports, lint, build, harness scaffolding,
      # corpus determinism, mindc-parse); full numerical gates run
      # locally before release tags.
      # -----------------------------------------------------------------------
      - name: PyTorch baseline (local gate — emit CI notice)
        run: |
          echo "::notice::bit-identity-cpu: PyTorch baseline is a pre-release LOCAL gate."
          echo "::notice::bit-identity-cpu: Run locally with:"
          echo "::notice::    mind-nerve-install --layout starga-shared   # install live checkpoint"
          echo "::notice::    python3 tests/bit_identity/runner.py --backend pytorch --limit 50 --out /tmp/h.json"
          echo "::notice::bit-identity-cpu: CI validates harness + corpus + sentinel paths only."

      # -----------------------------------------------------------------------
      # Step 5: Run native backend (emits sentinels when .so not present — that
      # is the expected state in open-source CI where the .so is not committed).
      # Asserts the harness runs and produces a well-formed JSON blob.
      # -----------------------------------------------------------------------
      - name: Run native backend (sentinel mode — .so absent in open-source CI)
        run: |
          python3 tests/bit_identity/runner.py \
            --backend native \
            --limit 10 \
            --out /tmp/hashes_native_ci.json
          python3 -c "
          import json, sys
          blob = json.loads(open('/tmp/hashes_native_ci.json').read())
          records = blob['records']
          if len(records) != 10:
              print(f'::error::Expected 10 records, got {len(records)}')
              sys.exit(1)
          sentinel = 'BACKEND_STUB_NOT_BUILT'
          for r in records:
              for k, v in r['hashes'].items():
                  if v not in (sentinel, 'CUDA_DEFERRED_TO_V0_4_1') and not (
                      len(v) == 64 and all(c in '0123456789abcdef' for c in v)
                  ):
                      print(f'::error::Unexpected native hash {v!r}')
                      sys.exit(1)
          print('Native sentinel mode: 10 queries produced well-formed sentinel hashes.')
          "

      # -----------------------------------------------------------------------
      # Step 6: Comparator gate runs against native↔native (both sentinel) so
      # the harness exercises in CI without needing the PyTorch checkpoint.
      # Live PyTorch-vs-native comparison is a local pre-release gate (see
      # Step 4's CI notice).
      # -----------------------------------------------------------------------
      - name: Comparator smoke (native sentinel ↔ native sentinel)
        run: |
          python3 tests/bit_identity/compare.py \
            /tmp/hashes_native_ci.json \
            /tmp/hashes_native_ci.json \
            --top-k 5 --topk-threshold 0.0 --top1-threshold 0.0
          echo "Comparator smoke completed — sentinel ↔ sentinel passed."

      # -----------------------------------------------------------------------
      # Step 7: Run CUDA backend (emits CUDA_DEFERRED_TO_V0_4_1 per §3.2).
      # -----------------------------------------------------------------------
      - name: Run CUDA backend (deferred sentinel per §3.2)
        run: |
          python3 tests/bit_identity/runner.py \
            --backend cuda \
            --limit 5 \
            --out /tmp/hashes_cuda_ci.json
          python3 -c "
          import json, sys
          blob = json.loads(open('/tmp/hashes_cuda_ci.json').read())
          sentinel = 'CUDA_DEFERRED_TO_V0_4_1'
          for r in blob['records']:
              for k, v in r['hashes'].items():
                  assert v == sentinel, f'Expected {sentinel!r}, got {v!r}'
          print('CUDA sentinel: all hashes are CUDA_DEFERRED_TO_V0_4_1 — OK.')
          "

      # -----------------------------------------------------------------------
      # Step 8: Sliding-window invariant (§3.3) — fast, no model needed.
      # -----------------------------------------------------------------------
      - name: Sliding-window invariant test (§3.3)
        run: |
          python3 tests/bit_identity/sliding_window_invariant.py \
            --corpus tests/bit_identity/corpus.json

      # -----------------------------------------------------------------------
      # Annotation: native .so absent is expected in open-source CI.
      # Full green-vs-green comparison requires the A1.3 wheel with the .so.
      # -----------------------------------------------------------------------
      - name: Annotate CI status
        if: always()
        run: |
          echo "::notice::bit-identity-cpu: harness scaffolding + corpus determinism + sentinel paths validated."
          echo "::notice::bit-identity-cpu: PyTorch baseline is a pre-release LOCAL gate (needs live checkpoint)."
          echo "::notice::bit-identity-cpu: Native backend absent (open-source CI) — sentinels emitted."
          echo "::notice::bit-identity-cpu: CUDA gate deferred to v0.4.1 per spec §3.2."
          echo "::notice::bit-identity-cpu: Full 1000-query baseline run is a pre-release local gate."
