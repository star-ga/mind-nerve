name: Release

# Publish mind-nerve to PyPI via trusted publishing (OIDC, no token secret)
# and attach SLSA-style build provenance plus a SHA256SUMS checksum file.
#
# Triggered by a release published in the repository's GitHub Releases
# UI, or by manual dispatch. The wheel and sdist are built from the
# public source tree only; production wheels that bundle the native
# runtime component are produced and published through a separate
# channel and are not in scope for this workflow.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional context for the manual run"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      wheel: ${{ steps.dist.outputs.wheel }}
      sdist: ${{ steps.dist.outputs.sdist }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: twine check
        run: twine check dist/*

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Capture artefact names
        id: dist
        run: |
          wheel=$(ls dist/*.whl)
          sdist=$(ls dist/*.tar.gz)
          echo "wheel=${wheel}" >> "$GITHUB_OUTPUT"
          echo "sdist=${sdist}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  attest:
    name: Attest build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate build provenance for wheel + sdist
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: [build, attest]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mind-nerve
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # PyPI's trusted publisher rejects files that aren't .whl or .tar.gz,
      # so move the checksum file out of dist/ before upload, then re-attach
      # it to the GitHub Release for verification by downstream consumers.
      - name: Stash SHA256SUMS for release attachment
        run: |
          mkdir -p release-assets
          if [ -f dist/SHA256SUMS ]; then
            mv dist/SHA256SUMS release-assets/SHA256SUMS
          fi
          ls -la dist/ release-assets/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          skip-existing: false

      - name: Attach SHA256SUMS to the GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            release-assets/SHA256SUMS \
            --clobber
