name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.5.7
      - name: ruff check
        run: ruff check python/mind_nerve
      - name: ruff format check
        run: ruff format --check python/mind_nerve

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - name: Note about protected .so
        run: |
          # The FORTRESS-protected libmindnerve.so is NOT in the public repo —
          # it's bundled into the wheel only at STARGA release time. CI here
          # validates the OSS surface (Python code, tests, lint, build); the
          # production wheel published to PyPI is built locally and re-uploaded.
          echo "CI builds an OSS-surface wheel (no .so). Release wheels are built locally with the protected runtime bundled."
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    name: Smoke test (Python ${{ matrix.python }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install wheel
        run: pip install dist/*.whl
      - name: Import smoke
        run: |
          python -c "
          import mind_nerve, pathlib
          assert mind_nerve.__version__
          p = pathlib.Path(mind_nerve.__file__).parent / 'lib' / 'libmindnerve.so'
          assert p.exists(), f'libmindnerve.so missing: {p}'
          print(f'mind_nerve {mind_nerve.__version__} OK; lib at {p}')
          "
      - name: CLI surface smoke
        run: |
          mind-nerve --version
          mind-nerve --help
          mind-nerve-install list

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest tests/python -v
